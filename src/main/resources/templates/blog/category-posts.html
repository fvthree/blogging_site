<html lang="en" xmlns="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{blog-layout}">

<th:block>
	<!--page title-->
	<div th:replace="partials/title-meta :: title-meta(${pageTitle})"></div>
</th:block>

<section layout:fragment="content">
	<div class="row mb-4">
		<div class="col-lg-8">
			<h3 th:text="${category.name}" class="mb-2"></h3>
			<p class="text-muted small" th:text="${category.description}"></p>
		</div>
	</div>

	<div class="row">
		<div class="col-lg-8">
		<!-- Blog Posts List -->
		<div class="blog-posts">
			<div th:if="${posts != null and !posts.isEmpty()}">
				<ul class="list-unstyled">
					<li th:each="post : ${posts}" class="mb-3 pb-3 border-bottom blog-post-item">
						<div class="d-flex justify-content-between align-items-start">
							<div class="flex-grow-1">
								<h5 class="mb-1">
									<a th:href="@{/post/{slug}(slug=${post.slug})}" class="text-dark text-decoration-none post-title-link" th:text="${post.title}"></a>
								</h5>
								<p class="text-muted mb-2 small" th:text="${post.excerpt}"></p>
								<div class="d-flex flex-wrap gap-2 align-items-center">
									<small th:if="${post.category != null}" class="badge bg-primary" th:text="${post.category.name}"></small>
									<small class="text-muted">
										<i class="ri-calendar-line"></i>
										<th:block th:text="${#temporals.format(post.publishedAt, 'd MMM yyyy')}"></th:block>
									</small>
									<small class="text-muted">
										<i class="ri-eye-line"></i>
										<th:block th:text="${post.viewCount}"></th:block>
									</small>
									<small class="text-muted">
										<i class="ri-user-line"></i>
										<th:block th:text="${post.author.getFullName()}"></th:block>
									</small>
								</div>
							</div>
							<a th:href="@{/post/{slug}(slug=${post.slug})}" class="btn btn-sm btn-outline-primary ms-3 read-btn">Read</a>
						</div>
					</li>
				</ul>
			</div>
			<div th:if="${posts == null or posts.isEmpty()}" class="alert alert-info">
				<p>No posts in this category.</p>
			</div>
			</div>

		<!-- Pagination -->
		<div th:if="${posts != null and posts.getTotalPages() > 1}" class="d-flex justify-content-between align-items-center mt-4">
			<a th:if="${posts.hasPrevious()}" href="#" class="btn btn-outline-secondary btn-sm">Previous</a>
			<span class="text-muted small">Page <span th:text="${posts.getNumber() + 1}"></span> of <span th:text="${posts.getTotalPages()}"></span></span>
			<a th:if="${posts.hasNext()}" href="#" class="btn btn-outline-secondary btn-sm">Next</a>
		</div>
		</div>

		<!-- Sidebar -->
		<div class="col-lg-4">
			<!-- All Categories -->
			<div class="card border-0 shadow-sm mb-4">
				<div class="card-header bg-light border-bottom">
					<h6 class="card-title mb-0">All Categories</h6>
				</div>
				<div class="card-body">
					<ul class="list-unstyled">
						<li th:each="cat : ${categories}" class="mb-2">
							<a th:href="@{/category/{slug}(slug=${cat.slug})}" class="text-decoration-none small" th:text="${cat.name}"></a>
						</li>
					</ul>
				</div>
			</div>

			<!-- Latest Posts -->
			<div class="card border-0 shadow-sm">
				<div class="card-header bg-light border-bottom">
					<h6 class="card-title mb-0">Latest Posts</h6>
				</div>
				<div class="card-body">
					<ul class="list-unstyled">
						<li th:each="latestPost : ${latestPosts}" class="mb-2 pb-2 border-bottom" th:if="${latestPost != null and !#strings.isEmpty(latestPost.slug)}">
							<a th:href="@{/post/{slug}(slug=${latestPost.slug})}" class="text-decoration-none small" th:text="${latestPost.title}"></a>
							<br/>
							<small class="text-muted">
								<i class="ri-calendar-line"></i>
								<th:block th:text="${#temporals.format(latestPost.publishedAt, 'd MMM yyyy')}"></th:block>
							</small>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
</section>

</html>
