version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: velzon-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: velzon_blog
      POSTGRES_USER: velzon_user
      POSTGRES_PASSWORD: velzon_secure_password_123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - velzon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velzon_user -d velzon_blog"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  velzon-network:
    driver: bridge

